<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>تسجيل الدخول | Ordexa منصة</title>
    <style>
        /* نفس CSS الأساسي من index.html + تعديلات صغيرة */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --deep-navy: #0A1128; --dark-slate: #121E3A; --pure-white: #FFFFFF; --off-white: #F8FAFE; --cool-gray: #EFF3F8; --slate-gray: #5A6E8A; --neon-blue: #2A6DFF; --vibrant-purple: #7B3FE4; --gradient-primary: linear-gradient(135deg, var(--neon-blue), var(--vibrant-purple)); --gradient-logo: linear-gradient(135deg, #2A6DFF, #9B4DFF); --shadow-sm: 0 12px 30px rgba(0, 0, 0, 0.05); --shadow-md: 0 20px 35px -10px rgba(0, 0, 0, 0.1); --transition-smooth: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        body { font-family: 'Cairo', 'Tajawal', system-ui, sans-serif; background-color: var(--pure-white); color: var(--deep-navy); line-height: 1.5; overflow-x: hidden; }
        body.en { direction: ltr; font-family: 'Inter', system-ui, sans-serif; text-align: left; }
        h1, h2, h3 { font-weight: 700; letter-spacing: -0.02em; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 1.5rem; }
        .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.8rem 1.6rem; border-radius: 50px; font-weight: 600; transition: var(--transition-smooth); cursor: pointer; border: none; font-size: 0.95rem; text-decoration: none; }
        .btn-primary { background: var(--gradient-primary); color: white; box-shadow: 0 8px 18px rgba(42, 109, 255, 0.25); }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(42, 109, 255, 0.35); }
        header { position: sticky; top: 0; z-index: 1000; background: rgba(255,255,255,0.96); backdrop-filter: blur(12px); box-shadow: var(--shadow-sm); padding: 0.8rem 0; }
        .navbar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.8rem; }
        .logo-area { display: flex; align-items: center; gap: 1rem; }
        .header-logo-img { height: 44px; width: auto; max-height: 50px; object-fit: contain; }
        .lang-header-btn { background: var(--cool-gray); border: none; padding: 0.45rem 1rem; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap; }
        .nav-links a { text-decoration: none; font-weight: 500; color: var(--deep-navy); transition: color 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: var(--neon-blue); }
        .mobile-menu-toggle { display: none; font-size: 1.6rem; background: none; border: none; cursor: pointer; }
        @media (max-width: 900px) { .nav-links { display: none; width: 100%; flex-direction: column; align-items: center; gap: 1rem; padding: 1rem 0; } .nav-links.show { display: flex; } .mobile-menu-toggle { display: block; } .logo-area { flex: 1; } .header-logo-img { height: 38px; } }
        .page-hero { background: linear-gradient(135deg, rgba(42,109,255,0.08), transparent); padding: 2.5rem 0; text-align: center; margin-bottom: 2rem; }
        .login-card { max-width: 500px; margin: 2rem auto; background: white; border-radius: 32px; padding: 2rem; box-shadow: var(--shadow-md); border: 1px solid var(--cool-gray); }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        .form-group input { width: 100%; padding: 0.8rem 1rem; border: 1px solid var(--cool-gray); border-radius: 28px; font-size: 1rem; font-family: inherit; transition: 0.2s; }
        .form-group input:focus { outline: none; border-color: var(--neon-blue); box-shadow: 0 0 0 3px rgba(42,109,255,0.1); }
        .login-btn { width: 100%; margin-top: 0.5rem; }
        .login-footer { text-align: center; margin-top: 1.5rem; color: var(--slate-gray); }
        .login-footer a { color: var(--neon-blue); text-decoration: none; }
        footer { background: var(--dark-slate); color: #cfdfed; padding: 2.5rem 0 1.5rem; margin-top: 3rem; }
        .footer-content { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 1.5rem; }
        .footer-logo-img { height: 42px; width: auto; filter: brightness(0) invert(1); }
        .footer-links { display: flex; gap: 1.2rem; flex-wrap: wrap; }
        .footer-links a { color: #cfdfed; text-decoration: none; font-size: 0.9rem; }
        .social-icons { display: flex; gap: 1rem; align-items: center; }
        .phone-number { background: rgba(255,255,255,0.1); padding: 0.35rem 0.8rem; border-radius: 40px; }
        .copyright { text-align: center; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); font-size: 0.75rem; }
        @media (max-width: 768px) { .container { padding: 0 1.2rem; } .login-card { margin: 1rem auto; } }
        .fade-up { opacity: 0; transform: translateY(35px); transition: opacity 0.7s ease, transform 0.7s ease; }
        .fade-up.visible { opacity: 1; transform: translateY(0); }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container navbar">
            <div class="logo-area">
                <img class="header-logo-img" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg8h07xrvSaXQ40FLkiIjv0nWbLy81uybfhvz-fzqf4gRnq8whBCmPYai7CzBTCFqVSyMURBPRSZ9EcC14JgkRM1P38h76Rp7V3CEGDDeiEuJmBtKP4FKNkw7qNqA6y_9VpYI7kxyLdVuxE5flbCdL2GWND06L4eA_EqXwg4Tpx-0QU4V7S4UXYHXZCjEM/s320/ei_1777296305238-removebg-preview.png" alt="Ordexa Logo">
                <button class="lang-header-btn" id="langToggleHeader">English</button>
            </div>
            <button class="mobile-menu-toggle" id="mobileMenuToggle">☰</button>
            <div class="nav-links" id="navLinks">
                <a href="index.html" data-i18n="nav_home">الرئيسية</a>
                <a href="about.html" data-i18n="nav_about">من نحن</a>
                <a href="login.html" class="active" data-i18n="nav_login">تسجيل الدخول</a>
                <a href="contact.html" data-i18n="nav_contact">اتصل بنا</a>
                <a href="index.html#demo" class="btn btn-primary" data-i18n="nav_cta">اطلب ديمو مجاني</a>
            </div>
        </div>
    </header>

    <main>
        <div class="page-hero">
            <div class="container">
                <h1 data-i18n="login_title">مرحباً بعودتك</h1>
                <p data-i18n="login_subtitle">سجل الدخول للوصول إلى لوحة التحكم الخاصة بك</p>
            </div>
        </div>

        <div class="container">
            <div class="login-card">
                <form id="loginForm" onsubmit="event.preventDefault(); alert(currentLang === 'ar' ? 'تم إرسال بيانات تسجيل الدخول بنجاح (تجريبي)' : 'Login submitted successfully (demo)');">
                    <div class="form-group">
                        <label data-i18n="email_label">البريد الإلكتروني</label>
                        <input type="email" id="email" placeholder="example@ordexa.com" required>
                    </div>
                    <div class="form-group">
                        <label data-i18n="password_label">كلمة المرور</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary login-btn" data-i18n="login_btn">تسجيل الدخول</button>
                    <div class="login-footer">
                        <p data-i18n="no_account">ليس لديك حساب؟ <a href="contact.html" data-i18n="contact_us">تواصل معنا</a></p>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container footer-content">
            <div class="footer-logo">
                <img class="footer-logo-img" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg8h07xrvSaXQ40FLkiIjv0nWbLy81uybfhvz-fzqf4gRnq8whBCmPYai7CzBTCFqVSyMURBPRSZ9EcC14JgkRM1P38h76Rp7V3CEGDDeiEuJmBtKP4FKNkw7qNqA6y_9VpYI7kxyLdVuxE5flbCdL2GWND06L4eA_EqXwg4Tpx-0QU4V7S4UXYHXZCjEM/s320/ei_1777296305238-removebg-preview.png" alt="Ordexa">
            </div>
            <div class="footer-links">
                <a href="index.html" data-i18n="nav_home">الرئيسية</a>
                <a href="about.html" data-i18n="nav_about">من نحن</a>
                <a href="login.html" data-i18n="nav_login">تسجيل الدخول</a>
                <a href="contact.html" data-i18n="nav_contact">اتصل بنا</a>
            </div>
            <div class="social-icons">
                <a href="https://www.facebook.com/ordexaplatform" target="_blank">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M22 12c0-5.523-4.477-10-10-10S2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.879v-6.99h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.99C18.343 21.128 22 16.991 22 12z"/></svg>
                </a>
                <a href="tel:01120687989" class="phone-number">📞 01120687989</a>
            </div>
        </div>
        <div class="container copyright">
            <p data-i18n="copyright">© 2026 Ordexa Platform – جميع الحقوق محفوظة. تصميم وتطوير المهندس ربيع الباز.</p>
        </div>
    </footer>

    <script>
        const translations = {
            ar: {
                nav_home: "الرئيسية", nav_about: "من نحن", nav_login: "تسجيل الدخول", nav_contact: "اتصل بنا", nav_cta: "اطلب ديمو مجاني",
                login_title: "مرحباً بعودتك", login_subtitle: "سجل الدخول للوصول إلى لوحة التحكم الخاصة بك",
                email_label: "البريد الإلكتروني", password_label: "كلمة المرور", login_btn: "تسجيل الدخول",
                no_account: "ليس لديك حساب؟", contact_us: "تواصل معنا",
                copyright: "© 2026 Ordexa Platform – جميع الحقوق محفوظة. تصميم وتطوير المهندس ربيع الباز."
            },
            en: {
                nav_home: "Home", nav_about: "About", nav_login: "Login", nav_contact: "Contact", nav_cta: "Get Free Demo",
                login_title: "Welcome Back", login_subtitle: "Sign in to access your dashboard",
                email_label: "Email Address", password_label: "Password", login_btn: "Login",
                no_account: "Don't have an account?", contact_us: "Contact us",
                copyright: "© 2026 Ordexa Platform – All rights reserved. Designed & developed by Eng. Rabie Elbaz."
            }
        };
        let currentLang = 'ar';
        function updateLanguage(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) el.innerText = translations[lang][key];
            });
            document.body.classList.toggle('en', lang === 'en');
            document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            document.getElementById('langToggleHeader').innerText = lang === 'ar' ? 'English' : 'العربية';
            currentLang = lang;
        }
        document.getElementById('langToggleHeader').addEventListener('click', () => updateLanguage(currentLang === 'ar' ? 'en' : 'ar'));
        document.getElementById('mobileMenuToggle').addEventListener('click', () => document.getElementById('navLinks').classList.toggle('show'));
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => { if(e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); } });
        }, { threshold: 0.1 });
        document.querySelectorAll('.login-card, .page-hero').forEach(el => { el.classList.add('fade-up'); observer.observe(el); });
        updateLanguage('ar');
    </script>
</body>
</html>
