<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordexa | تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(145deg, #f8fafc 0%, #eef2ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .auth-card {
            max-width: 460px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 30px 45px -15px rgba(0,0,0,0.2);
            padding: 2rem;
        }
        .logo {
            text-align: center;
            font-size: 2.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        h2 { text-align: center; font-weight: 700; margin-bottom: 0.3rem; color: #0f172a; }
        .sub { text-align: center; color: #475569; margin-bottom: 2rem; font-size:0.9rem; }
        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }
        .input-group i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }
        input {
            width: 100%;
            padding: 14px 48px 14px 20px;
            font-size: 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 60px;
            transition: 0.2s;
            font-family: inherit;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }
        .btn-primary {
            width: 100%;
            background: linear-gradient(105deg, #2563eb, #4f46e5);
            border: none;
            color: white;
            padding: 14px;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            margin-top: 0.5rem;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -8px #2563eb; }
        .footer-link { text-align: center; margin-top: 1.8rem; font-size:0.9rem; }
        .footer-link a { color: #2563eb; text-decoration: none; font-weight: 600; }
        .error-msg {
            background: #fee2e2;
            color: #b91c1c;
            padding: 10px 16px;
            border-radius: 60px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            text-align: center;
        }
        button:disabled { opacity:0.7; }
        @media (max-width: 520px) { body { padding:1rem; } .auth-card { padding:1.5rem; } }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="logo">Ordexa</div>
    <h2>مرحباً بعودتك</h2>
    <div class="sub">سجل الدخول للوصول إلى لوحة الأعمال</div>
    <div id="errorMessage" class="error-msg" style="display: none;"></div>
    <form id="loginForm">
        <div class="input-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="البريد الإلكتروني" required autocomplete="email">
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="كلمة المرور" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary" id="loginBtn">دخول <i class="fas fa-arrow-left"></i></button>
    </form>
    <div class="footer-link">
        ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a>
    </div>
</div>

<script type="module">
    import { initFirebase, signInWithEmail } from './auth.js';
    initFirebase();

    const form = document.getElementById('loginForm');
    const errorDiv = document.getElementById('errorMessage');
    const loginBtn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorDiv.style.display = 'none';
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        if (!email || !password) {
            showError('يرجى إدخال البريد وكلمة المرور');
            return;
        }

        loginBtn.disabled = true;
        loginBtn.innerText = 'جاري تسجيل الدخول...';

        try {
            await signInWithEmail(email, password);
            window.location.href = 'dashboard.html';
        } catch (err) {
            let msg = err.message;
            if (msg.includes('user-not-found') || msg.includes('wrong-password')) msg = 'البريد الإلكتروني أو كلمة المرور غير صحيحة';
            else if (msg.includes('invalid-email')) msg = 'صيغة البريد الإلكتروني غير صالحة';
            showError(msg);
            loginBtn.disabled = false;
            loginBtn.innerText = 'دخول';
        }
    });

    function showError(msg) {
        errorDiv.innerText = msg;
        errorDiv.style.display = 'block';
    }
</script>
</body>
</html>
<script src="js/auth.js"></script>
