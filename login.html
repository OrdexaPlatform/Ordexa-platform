<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>تسجيل الدخول | Ordexa منصة</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDoNUIF2bdo3Io7Ma3-mlFLhzRsM-kBoFM",
            authDomain: "ordexa-platforma.firebaseapp.com",
            projectId: "ordexa-platforma",
            storageBucket: "ordexa-platforma.firebasestorage.app",
            messagingSenderId: "443941203542",
            appId: "1:443941203542:web:1db99037cfec361b2155f7",
            measurementId: "G-CEGYC1BQPV"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const authMessage = document.getElementById('authMessage');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        let currentLang = 'ar';
        
        function showMessage(msg, isError = true) {
            authMessage.textContent = msg;
            authMessage.style.display = 'block';
            authMessage.style.backgroundColor = isError ? '#ffe5e5' : '#e0f7e0';
            authMessage.style.color = isError ? '#c62828' : '#2e7d32';
            setTimeout(() => { authMessage.style.display = 'none'; }, 5000);
        }
        
        // تسجيل الدخول بالبريد
        if (loginForm) {
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('loginEmail').value.trim();
                const password = document.getElementById('loginPassword').value;
                if (!email || !password) {
                    showMessage('الرجاء إدخال البريد الإلكتروني وكلمة المرور');
                    return;
                }
                try {
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;
                    if (!user.emailVerified) {
                        showMessage('يرجى تفعيل حسابك عبر البريد الإلكتروني المرسل إليك');
                        await signOut(auth);
                        return;
                    }
                    showMessage('تم تسجيل الدخول بنجاح! جاري التحويل...', false);
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
                } catch (error) {
                    let errorMsg = 'البريد أو كلمة المرور غير صحيحة';
                    if (error.code === 'auth/too-many-requests') errorMsg = 'تم تعطيل الحساب مؤقتاً';
                    showMessage(errorMsg);
                }
            });
        }
        
        // إنشاء حساب
        if (signupForm) {
            signupForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('signupEmail').value.trim();
                const password = document.getElementById('signupPassword').value;
                const confirm = document.getElementById('signupConfirmPassword').value;
                if (password !== confirm) {
                    showMessage('كلمتا المرور غير متطابقتين');
                    return;
                }
                if (password.length < 6) {
                    showMessage('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                    return;
                }
                try {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    await sendEmailVerification(userCredential.user);
                    showMessage('تم إنشاء الحساب! تم إرسال رابط التفعيل إلى بريدك.', false);
                    signupForm.reset();
                    setTimeout(() => document.getElementById('showLogin')?.click(), 3000);
                } catch (error) {
                    let errorMsg = 'حدث خطأ، حاول مرة أخرى';
                    if (error.code === 'auth/email-already-in-use') errorMsg = 'البريد مسجل بالفعل';
                    showMessage(errorMsg);
                }
            });
        }
        
        // Google Sign-In
        if (googleLoginBtn) {
            googleLoginBtn.addEventListener('click', async () => {
                try {
                    const result = await signInWithPopup(auth, provider);
                    showMessage(`مرحباً ${result.user.displayName || result.user.email}! جاري التحويل...`, false);
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
                } catch (error) {
                    let errorMsg = 'فشل تسجيل الدخول عبر جوجل';
                    if (error.code === 'auth/popup-closed-by-user') errorMsg = 'تم إغلاق النافذة قبل إتمام تسجيل الدخول';
                    else if (error.code === 'auth/unauthorized-domain') errorMsg = 'النطاق غير مصرح به، الرجاء إضافة النطاق في Firebase Console (Authorized domains)';
                    showMessage(errorMsg);
                }
            });
        }
        
        // التبديل بين بطاقات تسجيل الدخول وإنشاء الحساب
        document.getElementById('showSignup').onclick = () => {
            document.getElementById('loginCard').style.display = 'none';
            document.getElementById('signupCard').style.display = 'block';
        };
        document.getElementById('showLogin').onclick = () => {
            document.getElementById('signupCard').style.display = 'none';
            document.getElementById('loginCard').style.display = 'block';
        };
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f5f7fc; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .auth-card { max-width: 450px; width: 90%; background: white; border-radius: 32px; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin: 1rem; }
        .btn-primary { background: linear-gradient(135deg, #2A6DFF, #7B3FE4); color: white; border: none; padding: 0.8rem; width: 100%; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .btn-google { background: white; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 0.7rem; border-radius: 50px; cursor: pointer; margin-bottom: 1rem; }
        .divider { text-align: center; margin: 1rem 0; color: #aaa; }
        .form-group { margin-bottom: 1rem; }
        input { width: 100%; padding: 0.7rem; border-radius: 28px; border: 1px solid #ddd; }
        .auth-footer { text-align: center; margin-top: 1rem; }
        .auth-footer a { color: #2A6DFF; cursor: pointer; text-decoration: underline; }
        .message-box { padding: 0.7rem; border-radius: 28px; margin-bottom: 1rem; text-align: center; display: none; }
        h2 { text-align: center; margin-bottom: 1.5rem; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div>
        <div id="loginCard" class="auth-card">
            <h2>🔐 تسجيل الدخول</h2>
            <div id="authMessage" class="message-box"></div>
            <button id="googleLoginBtn" class="btn-google"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20"> تسجيل الدخول عبر Google</button>
            <div class="divider">أو</div>
            <form id="loginForm">
                <div class="form-group"><input type="email" id="loginEmail" placeholder="البريد الإلكتروني" required></div>
                <div class="form-group"><input type="password" id="loginPassword" placeholder="كلمة المرور" required></div>
                <button type="submit" class="btn-primary">تسجيل الدخول</button>
                <div class="auth-footer">ليس لديك حساب؟ <a id="showSignup">إنشاء حساب جديد</a></div>
            </form>
        </div>
        <div id="signupCard" class="auth-card" style="display: none;">
            <h2>📝 إنشاء حساب جديد</h2>
            <form id="signupForm">
                <div class="form-group"><input type="email" id="signupEmail" placeholder="البريد الإلكتروني" required></div>
                <div class="form-group"><input type="password" id="signupPassword" placeholder="كلمة المرور" required></div>
                <div class="form-group"><input type="password" id="signupConfirmPassword" placeholder="تأكيد كلمة المرور" required></div>
                <button type="submit" class="btn-primary">إنشاء حساب</button>
                <div class="auth-footer">لديك حساب؟ <a id="showLogin">تسجيل الدخول</a></div>
            </form>
        </div>
    </div>
</body>
</html>
