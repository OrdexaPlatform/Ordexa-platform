<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>تسجيل الدخول | Ordexa Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0A0F1E, #05080F);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
            overflow-x: hidden;
        }
        /* floating shapes */
        .shape {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(37,99,235,0.15), transparent);
            border-radius: 50%;
            filter: blur(60px);
            z-index: 0;
        }
        .shape-1 { top: -100px; left: -100px; }
        .shape-2 { bottom: -100px; right: -100px; background: radial-gradient(circle, rgba(139,92,246,0.15), transparent); }
        .auth-card {
            position: relative;
            z-index: 10;
            max-width: 480px;
            width: 100%;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 2rem 2rem 2.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
            transition: all 0.3s;
        }
        .logo {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #2563EB, #8B5CF6, #F59E0B);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        .greeting {
            text-align: center;
            color: #94A3B8;
            margin-bottom: 1.8rem;
            font-size: 0.9rem;
        }
        .input-group {
            margin-bottom: 1.2rem;
        }
        .input-group input {
            width: 100%;
            padding: 1rem 1.2rem;
            background: #1E293B;
            border: 1px solid #334155;
            border-radius: 60px;
            color: #F1F5F9;
            font-size: 1rem;
            font-family: inherit;
            transition: 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #2563EB;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.2);
        }
        .btn-primary {
            width: 100%;
            background: linear-gradient(95deg, #2563EB, #8B5CF6);
            border: none;
            padding: 1rem;
            border-radius: 60px;
            font-weight: 700;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 0.5rem;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(37,99,235,0.4);
        }
        .btn-google {
            width: 100%;
            background: #1E293B;
            border: 1px solid #334155;
            padding: 0.9rem;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            color: #CBD5E1;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 1rem;
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: #64748B;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #334155;
        }
        .divider span { margin: 0 0.8rem; font-size: 0.8rem; }
        .toggle {
            text-align: center;
            margin-top: 1.2rem;
            color: #94A3B8;
        }
        .toggle a {
            color: #F59E0B;
            cursor: pointer;
            font-weight: 600;
        }
        .message {
            background: rgba(239,68,68,0.1);
            border-radius: 60px;
            padding: 0.6rem;
            text-align: center;
            margin-bottom: 1rem;
            font-size: 0.8rem;
            color: #F87171;
            display: none;
        }
        .message.success {
            background: rgba(34,197,94,0.1);
            color: #4ADE80;
        }
        @media (max-width: 500px) {
            .auth-card { padding: 1.5rem; }
        }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDoNUIF2bdo3Io7Ma3-mlFLhzRsM-kBoFM",
            authDomain: "ordexa-platforma.firebaseapp.com",
            projectId: "ordexa-platforma",
            storageBucket: "ordexa-platforma.firebasestorage.app",
            messagingSenderId: "443941203542",
            appId: "1:443941203542:web:1db99037cfec361b2155f7",
            measurementId: "G-CEGYC1BQPV"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let loginMode = true;
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const toggleLink = document.getElementById('toggleLink');
        const formTitle = document.getElementById('formTitle');

        function showMessage(msg, isError = true) {
            messageDiv.innerText = msg;
            messageDiv.style.display = 'block';
            messageDiv.className = isError ? 'message' : 'message success';
            setTimeout(() => { messageDiv.style.display = 'none'; }, 5000);
        }

        async function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) { showMessage('يرجى ملء جميع الحقول'); return; }
            try {
                if (loginMode) {
                    await signInWithEmailAndPassword(auth, email, password);
                    window.location.href = 'dashboard.html';
                } else {
                    const userCred = await createUserWithEmailAndPassword(auth, email, password);
                    await sendEmailVerification(userCred.user);
                    await setDoc(doc(db, 'users', userCred.user.uid), {
                        email: email,
                        fullName: email.split('@')[0],
                        phone: '',
                        createdAt: new Date().toISOString(),
                        orders: [],
                        activeProducts: []
                    });
                    showMessage('تم إنشاء الحساب! يرجى تفعيل البريد الإلكتروني ثم تسجيل الدخول.', false);
                    setTimeout(() => { window.location.href = 'login.html'; }, 3000);
                }
            } catch (err) {
                let msg = err.message;
                if (err.code === 'auth/email-already-in-use') msg = 'البريد الإلكتروني مسجل بالفعل';
                if (err.code === 'auth/wrong-password') msg = 'كلمة المرور غير صحيحة';
                if (err.code === 'auth/user-not-found') msg = 'لا يوجد حساب بهذا البريد';
                showMessage(msg);
            }
        }

        async function googleSignIn() {
            try {
                const result = await signInWithPopup(auth, provider);
                await setDoc(doc(db, 'users', result.user.uid), {
                    email: result.user.email,
                    fullName: result.user.displayName || result.user.email.split('@')[0],
                    phone: '',
                }, { merge: true });
                window.location.href = 'dashboard.html';
            } catch (err) {
                showMessage('فشل تسجيل الدخول بجوجل');
            }
        }

        function toggleMode() {
            loginMode = !loginMode;
            formTitle.innerText = loginMode ? 'تسجيل الدخول' : 'إنشاء حساب جديد';
            submitBtn.innerText = loginMode ? 'تسجيل الدخول' : 'إنشاء حساب';
            toggleLink.innerHTML = loginMode ? 'ليس لديك حساب؟ <a id="toggleAction">إنشاء حساب جديد</a>' : 'لديك حساب بالفعل؟ <a id="toggleAction">تسجيل الدخول</a>';
            document.getElementById('toggleAction').addEventListener('click', toggleMode);
        }

        document.getElementById('authForm').addEventListener('submit', handleAuth);
        document.getElementById('googleBtn').addEventListener('click', googleSignIn);
        toggleMode();
    </script>
</head>
<body>
<div class="shape shape-1"></div>
<div class="shape shape-2"></div>
<div class="auth-card">
    <div class="logo">Ordexa</div>
    <div class="greeting">منصة متكاملة للحلول الرقمية</div>
    <div id="message" class="message"></div>
    <form id="authForm">
        <div class="input-group"><input type="email" id="email" placeholder="البريد الإلكتروني" autocomplete="email"></div>
        <div class="input-group"><input type="password" id="password" placeholder="كلمة المرور" autocomplete="current-password"></div>
        <button type="submit" class="btn-primary" id="submitBtn">تسجيل الدخول</button>
    </form>
    <div class="divider"><span>أو</span></div>
    <button class="btn-google" id="googleBtn">🔵 تسجيل الدخول عبر Google</button>
    <div class="toggle" id="toggleLink"></div>
</div>
</body>
</html>
