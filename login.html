<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>تسجيل الدخول | Ordexa Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', 'Tajawal', sans-serif;
            background: #0B1120;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .auth-card {
            max-width: 450px;
            width: 100%;
            background: #1E293B;
            border-radius: 40px;
            padding: 2rem;
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }
        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #2563EB, #8B5CF6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 1rem;
        }
        input {
            width: 100%;
            padding: 0.8rem 1rem;
            margin: 0.5rem 0;
            border-radius: 60px;
            border: 1px solid #334155;
            background: #0F172A;
            color: white;
            font-family: inherit;
        }
        button {
            width: 100%;
            padding: 0.8rem;
            background: #2563EB;
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            margin-top: 0.5rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .google-btn {
            background: #1E293B;
            border: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .divider {
            text-align: center;
            margin: 1rem 0;
            color: #94A3B8;
        }
        .toggle-link {
            text-align: center;
            margin-top: 1rem;
            color: #94A3B8;
        }
        .toggle-link a {
            color: #F59E0B;
            cursor: pointer;
        }
        .message {
            background: #1E293B;
            border-radius: 60px;
            padding: 0.5rem;
            text-align: center;
            margin-bottom: 1rem;
            font-size: 0.8rem;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDoNUIF2bdo3Io7Ma3-mlFLhzRsM-kBoFM",
            authDomain: "ordexa-platforma.firebaseapp.com",
            projectId: "ordexa-platforma",
            storageBucket: "ordexa-platforma.firebasestorage.app",
            messagingSenderId: "443941203542",
            appId: "1:443941203542:web:1db99037cfec361b2155f7",
            measurementId: "G-CEGYC1BQPV"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let isLogin = true;
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const toggleLink = document.getElementById('toggleLink');
        const formTitle = document.getElementById('formTitle');
        const googleBtn = document.getElementById('googleBtn');

        function showMessage(msg, isError = true) {
            messageDiv.innerText = msg;
            messageDiv.style.display = 'block';
            messageDiv.style.backgroundColor = isError ? '#EF444420' : '#22C55E20';
            messageDiv.style.color = isError ? '#F87171' : '#4ADE80';
            setTimeout(() => messageDiv.style.display = 'none', 4000);
        }

        async function handleSubmit(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) { showMessage('يرجى ملء جميع الحقول'); return; }
            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, email, password);
                    window.location.href = 'dashboard.html';
                } else {
                    const userCred = await createUserWithEmailAndPassword(auth, email, password);
                    await sendEmailVerification(userCred.user);
                    // إنشاء وثيقة افتراضية للمستخدم الجديد في Firestore
                    await setDoc(doc(db, 'users', userCred.user.uid), {
                        email: email,
                        fullName: email.split('@')[0],
                        phone: '',
                        createdAt: new Date().toISOString(),
                        orders: [],
                        invoices: [],
                        activeProducts: []
                    });
                    showMessage('تم إنشاء الحساب! تحقق من بريدك لتفعيل الحساب.', false);
                    isLogin = true;
                    updateForm();
                }
            } catch (err) {
                let msg = err.message;
                if (err.code === 'auth/email-already-in-use') msg = 'البريد الإلكتروني مسجل بالفعل';
                if (err.code === 'auth/wrong-password') msg = 'كلمة المرور غير صحيحة';
                if (err.code === 'auth/user-not-found') msg = 'لا يوجد حساب بهذا البريد';
                showMessage(msg);
            }
        }

        async function googleSignIn() {
            try {
                const result = await signInWithPopup(auth, provider);
                // التأكد من وجود وثيقة في Firestore
                const userRef = doc(db, 'users', result.user.uid);
                await setDoc(userRef, { email: result.user.email, fullName: result.user.displayName || '', phone: '' }, { merge: true });
                window.location.href = 'dashboard.html';
            } catch (err) {
                showMessage('فشل تسجيل الدخول بجوجل');
            }
        }

        function updateForm() {
            formTitle.innerText = isLogin ? 'تسجيل الدخول' : 'إنشاء حساب جديد';
            submitBtn.innerText = isLogin ? 'تسجيل الدخول' : 'إنشاء حساب';
            toggleLink.innerHTML = isLogin ? 'ليس لديك حساب؟ <a id="toggleAction">إنشاء حساب جديد</a>' : 'لديك حساب بالفعل؟ <a id="toggleAction">تسجيل الدخول</a>';
            document.getElementById('toggleAction').addEventListener('click', () => { isLogin = !isLogin; updateForm(); });
        }

        document.getElementById('authForm').addEventListener('submit', handleSubmit);
        googleBtn.addEventListener('click', googleSignIn);
        updateForm();
    </script>
</head>
<body>
<div class="auth-card">
    <div class="logo">Ordexa</div>
    <div id="message" class="message" style="display: none;"></div>
    <form id="authForm">
        <input type="email" id="email" placeholder="البريد الإلكتروني" required>
        <input type="password" id="password" placeholder="كلمة المرور" required>
        <button id="submitBtn" type="submit">تسجيل الدخول</button>
    </form>
    <div class="divider">أو</div>
    <button id="googleBtn" class="google-btn">🔵 تسجيل الدخول عبر Google</button>
    <div class="toggle-link" id="toggleLink"></div>
</div>
</body>
</html>
