<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>تسجيل الدخول | Ordexa منصة - المهندس ربيع الباز</title>
    <meta name="description" content="تسجيل الدخول إلى منصة Ordexa للحلول الرقمية المتكاملة: مواقع الشركات، المنيو الإلكتروني، المتاجر الإلكترونية.">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ===== أساسيات الموقع الرئيسي ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --deep-navy: #0A1128;
            --dark-slate: #121E3A;
            --pure-white: #FFFFFF;
            --cool-gray: #EFF3F8;
            --slate-gray: #5A6E8A;
            --neon-blue: #2A6DFF;
            --vibrant-purple: #7B3FE4;
            --gradient-primary: linear-gradient(135deg, var(--neon-blue), var(--vibrant-purple));
            --gradient-gold: linear-gradient(135deg, #F5AF19, #F12711);
            --shadow-sm: 0 12px 30px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 20px 35px -10px rgba(0, 0, 0, 0.1);
            --transition-smooth: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        body {
            font-family: 'Cairo', 'Tajawal', sans-serif;
            background-color: var(--pure-white);
            color: var(--deep-navy);
            line-height: 1.5;
            overflow-x: hidden;
        }
        body.en {
            direction: ltr;
            font-family: 'Inter', sans-serif;
            text-align: left;
        }
        h1, h2, h3, h4 {
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.8rem 1.6rem;
            border-radius: 50px;
            font-weight: 600;
            transition: var(--transition-smooth);
            cursor: pointer;
            border: none;
            font-size: 0.95rem;
            text-decoration: none;
        }
        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            box-shadow: 0 8px 18px rgba(42, 109, 255, 0.25);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(42, 109, 255, 0.35);
        }
        .btn-outline {
            border: 2px solid var(--deep-navy);
            color: var(--deep-navy);
            background: transparent;
        }
        .btn-outline:hover {
            background: var(--deep-navy);
            color: white;
        }
        /* header & navbar */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(12px);
            box-shadow: var(--shadow-sm);
            padding: 0.8rem 0;
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .header-logo-img {
            height: 44px;
            width: auto;
            max-height: 50px;
            object-fit: contain;
        }
        .lang-header-btn {
            background: var(--cool-gray);
            border: none;
            padding: 0.45rem 1rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
        }
        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .nav-links a {
            text-decoration: none;
            font-weight: 500;
            color: var(--deep-navy);
            transition: color 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--neon-blue);
        }
        .mobile-menu-toggle {
            display: none;
            font-size: 1.6rem;
            background: none;
            border: none;
            cursor: pointer;
        }
        @media (max-width: 900px) {
            .nav-links {
                display: none;
                width: 100%;
                flex-direction: column;
                align-items: center;
                gap: 1rem;
                padding: 1rem 0;
            }
            .nav-links.show {
                display: flex;
            }
            .mobile-menu-toggle {
                display: block;
            }
            .logo-area {
                flex: 1;
            }
        }
        /* قسم تسجيل الدخول (بطاقة مدمجة مع التصميم) */
        .auth-section {
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
            position: relative;
        }
        .auth-card {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 48px;
            padding: 2rem 2rem 2.5rem;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(42, 109, 255, 0.15);
            transition: var(--transition-smooth);
            backdrop-filter: blur(0px);
        }
        .auth-card:hover {
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
            border-color: var(--neon-blue);
        }
        .auth-logo {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
        }
        .auth-sub {
            text-align: center;
            color: var(--slate-gray);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .input-group {
            margin-bottom: 1.2rem;
        }
        .input-group input {
            width: 100%;
            padding: 1rem 1.2rem;
            background: var(--cool-gray);
            border: 1px solid transparent;
            border-radius: 60px;
            color: var(--deep-navy);
            font-size: 1rem;
            font-family: inherit;
            transition: 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--neon-blue);
            background: white;
            box-shadow: 0 0 0 3px rgba(42, 109, 255, 0.15);
        }
        .btn-block {
            width: 100%;
            background: var(--gradient-primary);
            border: none;
            padding: 1rem;
            border-radius: 60px;
            font-weight: 700;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 0.5rem;
        }
        .btn-block:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(42, 109, 255, 0.4);
        }
        .btn-google {
            width: 100%;
            background: var(--cool-gray);
            border: 1px solid rgba(0, 0, 0, 0.05);
            padding: 0.85rem;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            color: var(--deep-navy);
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 1rem;
        }
        .btn-google:hover {
            background: #e9ecef;
            border-color: var(--neon-blue);
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--slate-gray);
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }
        .divider span {
            margin: 0 0.8rem;
            font-size: 0.8rem;
        }
        .toggle-auth {
            text-align: center;
            margin-top: 1.2rem;
            color: var(--slate-gray);
        }
        .toggle-auth a {
            color: var(--neon-blue);
            cursor: pointer;
            font-weight: 700;
            text-decoration: none;
        }
        .message {
            background: rgba(239, 68, 68, 0.1);
            border-radius: 60px;
            padding: 0.7rem;
            text-align: center;
            margin-bottom: 1.2rem;
            font-size: 0.8rem;
            color: #e53e3e;
            display: none;
        }
        .message.success {
            background: rgba(72, 187, 120, 0.1);
            color: #2f855a;
        }
        /* footer مثل الموقع الرئيسي */
        footer {
            background: var(--dark-slate);
            color: #cfdfed;
            padding: 2.5rem 0 1.5rem;
            margin-top: 3rem;
        }
        .footer-content {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1.5rem;
        }
        .footer-logo-img {
            height: 42px;
            width: auto;
            filter: brightness(0) invert(1);
        }
        .footer-links {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
        }
        .footer-links a {
            color: #cfdfed;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .footer-links a:hover {
            color: var(--neon-blue);
        }
        .social-icons {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .phone-number {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.35rem 0.8rem;
            border-radius: 40px;
        }
        .copyright {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.75rem;
        }
        @media (max-width: 600px) {
            .auth-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container navbar">
            <div class="logo-area">
                <img class="header-logo-img" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg8h07xrvSaXQ40FLkiIjv0nWbLy81uybfhvz-fzqf4gRnq8whBCmPYai7CzBTCFqVSyMURBPRSZ9EcC14JgkRM1P38h76Rp7V3CEGDDeiEuJmBtKP4FKNkw7qNqA6y_9VpYI7kxyLdVuxE5flbCdL2GWND06L4eA_EqXwg4Tpx-0QU4V7S4UXYHXZCjEM/s320/ei_1777296305238-removebg-preview.png" alt="Ordexa Logo">
                <button class="lang-header-btn" id="langToggleHeader">English</button>
            </div>
            <button class="mobile-menu-toggle" id="mobileMenuToggle">☰</button>
            <div class="nav-links" id="navLinks">
                <a href="index.html">الرئيسية</a>
                <a href="about.html">من نحن</a>
                <a href="login.html" class="active">تسجيل الدخول</a>
                <a href="contact.html">اتصل بنا</a>
                <a href="#demo" class="btn btn-primary" id="demoNavBtn">اطلب ديمو مجاني</a>
            </div>
        </div>
    </header>

    <main>
        <div class="auth-section">
            <div class="auth-card">
                <div class="auth-logo">Ordexa</div>
                <div class="auth-sub" id="greetingText">مرحباً بك في منصتك الرقمية</div>
                <div id="message" class="message"></div>
                <form id="authForm">
                    <div class="input-group">
                        <input type="email" id="email" placeholder="البريد الإلكتروني" autocomplete="email">
                    </div>
                    <div class="input-group">
                        <input type="password" id="password" placeholder="كلمة المرور" autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn-block" id="submitBtn">تسجيل الدخول</button>
                </form>
                <div class="divider"><span>أو</span></div>
                <button class="btn-google" id="googleBtn">🔵 تسجيل الدخول عبر Google</button>
                <div class="toggle-auth" id="toggleLink"></div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <img class="footer-logo-img" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg8h07xrvSaXQ40FLkiIjv0nWbLy81uybfhvz-fzqf4gRnq8whBCmPYai7CzBTCFqVSyMURBPRSZ9EcC14JgkRM1P38h76Rp7V3CEGDDeiEuJmBtKP4FKNkw7qNqA6y_9VpYI7kxyLdVuxE5flbCdL2GWND06L4eA_EqXwg4Tpx-0QU4V7S4UXYHXZCjEM/s320/ei_1777296305238-removebg-preview.png" alt="Ordexa">
                <div class="footer-links">
                    <a href="index.html">الرئيسية</a>
                    <a href="about.html">من نحن</a>
                    <a href="login.html">تسجيل الدخول</a>
                    <a href="contact.html">اتصل بنا</a>
                </div>
                <div class="social-icons">
                    <span class="phone-number">📞 +20 10 1234 5678</span>
                </div>
            </div>
            <div class="copyright">© 2025 Ordexa - جميع الحقوق محفوظة | تصميم وبرمجة المهندس ربيع الباز</div>
        </div>
    </footer>

    <script type="module">
        // ---------- Firebase Modules ----------
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDoNUIF2bdo3Io7Ma3-mlFLhzRsM-kBoFM",
            authDomain: "ordexa-platforma.firebaseapp.com",
            projectId: "ordexa-platforma",
            storageBucket: "ordexa-platforma.firebasestorage.app",
            messagingSenderId: "443941203542",
            appId: "1:443941203542:web:1db99037cfec361b2155f7",
            measurementId: "G-CEGYC1BQPV"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        // ---------- State & DOM ----------
        let loginMode = true;  // true=login, false=signup
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const toggleLinkSpan = document.getElementById('toggleLink');
        const greetingText = document.getElementById('greetingText');
        const authForm = document.getElementById('authForm');
        const googleBtn = document.getElementById('googleBtn');

        // ---------- ترجمة ديناميكية متوافقة مع الموقع الرئيسي ----------
        let currentLang = localStorage.getItem('ordeva_lang') || 'ar';
        const translations = {
            ar: {
                loginTitle: "تسجيل الدخول إلى حسابك",
                signupTitle: "إنشاء حساب جديد",
                loginBtn: "تسجيل الدخول",
                signupBtn: "إنشاء حساب",
                greeting: "مرحباً بك في منصتك الرقمية",
                noAccount: "ليس لديك حساب؟ <a id='switchAction'>إنشاء حساب جديد</a>",
                haveAccount: "لديك حساب بالفعل؟ <a id='switchAction'>تسجيل الدخول</a>",
                googleBtnTxt: "🔵 تسجيل الدخول عبر Google",
                googleSignupTxt: "🔵 إنشاء حساب عبر Google",
                emailPlaceholder: "البريد الإلكتروني",
                passwordPlaceholder: "كلمة المرور",
                msgFillFields: "يرجى ملء جميع الحقول",
                msgEmailExists: "البريد الإلكتروني مسجل بالفعل",
                msgWrongPass: "كلمة المرور غير صحيحة",
                msgUserNotFound: "لا يوجد حساب بهذا البريد",
                msgWeakPassword: "كلمة المرور ضعيفة جداً (6 أحرف على الأقل)",
                msgSignupSuccess: "تم إنشاء الحساب! يرجى تفعيل البريد الإلكتروني ثم تسجيل الدخول.",
                msgGoogleFail: "فشل تسجيل الدخول بواسطة Google",
                msgGoogleClosed: "تم إغلاق النافذة قبل إتمام تسجيل الدخول",
                defaultError: "حدث خطأ، حاول مرة أخرى"
            },
            en: {
                loginTitle: "Login to Your Account",
                signupTitle: "Create New Account",
                loginBtn: "Login",
                signupBtn: "Sign Up",
                greeting: "Welcome to your digital platform",
                noAccount: "Don't have an account? <a id='switchAction'>Create new account</a>",
                haveAccount: "Already have an account? <a id='switchAction'>Login</a>",
                googleBtnTxt: "🔵 Sign in with Google",
                googleSignupTxt: "🔵 Sign up with Google",
                emailPlaceholder: "Email Address",
                passwordPlaceholder: "Password",
                msgFillFields: "Please fill all fields",
                msgEmailExists: "Email already in use",
                msgWrongPass: "Incorrect password",
                msgUserNotFound: "No account found with this email",
                msgWeakPassword: "Password is too weak (min 6 characters)",
                msgSignupSuccess: "Account created! Please verify your email then login.",
                msgGoogleFail: "Google sign-in failed",
                msgGoogleClosed: "Popup closed before completing sign-in",
                defaultError: "Something went wrong, try again"
            }
        };

        function updateUILanguage() {
            const t = translations[currentLang];
            document.getElementById('email').placeholder = t.emailPlaceholder;
            document.getElementById('password').placeholder = t.passwordPlaceholder;
            greetingText.innerText = t.greeting;
            googleBtn.innerText = loginMode ? t.googleBtnTxt : t.googleSignupTxt;
            submitBtn.innerText = loginMode ? t.loginBtn : t.signupBtn;
            if (loginMode) {
                toggleLinkSpan.innerHTML = t.noAccount;
            } else {
                toggleLinkSpan.innerHTML = t.haveAccount;
            }
            const switchLink = document.getElementById('switchAction');
            if (switchLink) {
                switchLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    loginMode = !loginMode;
                    updateUILanguage();
                });
            }
        }

        function applyLanguageDirection() {
            if (currentLang === 'en') {
                document.body.classList.add('en');
                document.documentElement.setAttribute('dir', 'ltr');
                document.documentElement.setAttribute('lang', 'en');
                document.getElementById('langToggleHeader').innerText = 'العربية';
            } else {
                document.body.classList.remove('en');
                document.documentElement.setAttribute('dir', 'rtl');
                document.documentElement.setAttribute('lang', 'ar');
                document.getElementById('langToggleHeader').innerText = 'English';
            }
            updateUILanguage();
        }

        function showMessage(msg, isError = true) {
            messageDiv.innerText = msg;
            messageDiv.style.display = 'block';
            messageDiv.className = isError ? 'message' : 'message success';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        async function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) {
                showMessage(translations[currentLang].msgFillFields);
                return;
            }
            try {
                if (loginMode) {
                    // تسجيل الدخول
                    await signInWithEmailAndPassword(auth, email, password);
                    // بعد نجاح الدخول نوجه إلى لوحة التحكم (يمكن تعديل الرابط حسب الحاجة)
                    window.location.href = 'dashboard.html';
                } else {
                    // إنشاء حساب
                    const userCred = await createUserWithEmailAndPassword(auth, email, password);
                    await sendEmailVerification(userCred.user);
                    await setDoc(doc(db, 'users', userCred.user.uid), {
                        email: email,
                        fullName: email.split('@')[0],
                        phone: '',
                        createdAt: new Date().toISOString(),
                        orders: [],
                        activeProducts: []
                    });
                    showMessage(translations[currentLang].msgSignupSuccess, false);
                    // بعد 3 ثوانٍ ننتقل لوضع تسجيل الدخول ونفرغ الحقول
                    setTimeout(() => {
                        loginMode = true;
                        updateUILanguage();
                        document.getElementById('email').value = '';
                        document.getElementById('password').value = '';
                    }, 3000);
                }
            } catch (err) {
                let msg = translations[currentLang].defaultError;
                if (err.code === 'auth/email-already-in-use') msg = translations[currentLang].msgEmailExists;
                else if (err.code === 'auth/wrong-password') msg = translations[currentLang].msgWrongPass;
                else if (err.code === 'auth/user-not-found') msg = translations[currentLang].msgUserNotFound;
                else if (err.code === 'auth/weak-password') msg = translations[currentLang].msgWeakPassword;
                else if (err.message) msg = err.message;
                showMessage(msg);
            }
        }

        async function googleSignIn() {
            try {
                const result = await signInWithPopup(auth, googleProvider);
                // حفظ بيانات المستخدم في Firestore
                await setDoc(doc(db, 'users', result.user.uid), {
                    email: result.user.email,
                    fullName: result.user.displayName || result.user.email.split('@')[0],
                    phone: result.user.phoneNumber || '',
                    lastLogin: new Date().toISOString()
                }, { merge: true });
                window.location.href = 'dashboard.html';
            } catch (err) {
                if (err.code === 'auth/popup-closed-by-user') {
                    showMessage(translations[currentLang].msgGoogleClosed);
                } else {
                    showMessage(translations[currentLang].msgGoogleFail);
                }
            }
        }

        // تبديل اللغة (بنفس آلية الموقع الرئيسي)
        document.getElementById('langToggleHeader').addEventListener('click', () => {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            localStorage.setItem('ordeva_lang', currentLang);
            applyLanguageDirection();
        });

        // حدث ربط التبديل عبر التوكن
        authForm.addEventListener('submit', handleAuth);
        googleBtn.addEventListener('click', googleSignIn);

        // تحميل اللغة والواجهة
        applyLanguageDirection();

        // دعم القائمة الموبايل
        const mobileToggle = document.getElementById('mobileMenuToggle');
        const navLinksDiv = document.getElementById('navLinks');
        if (mobileToggle) {
            mobileToggle.addEventListener('click', () => {
                navLinksDiv.classList.toggle('show');
            });
        }

        // زر ديمو تجريبي
        const demoBtn = document.getElementById('demoNavBtn');
        if (demoBtn) {
            demoBtn.addEventListener('click', (e) => {
                e.preventDefault();
                showMessage(translations[currentLang].defaultError === "Something went wrong, try again" ? "Demo request: contact us on WhatsApp" : "طلب ديمو: تواصل معنا واتساب", false);
            });
        }
    </script>
</body>
                </html>
