<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>لوحة تحكم Ordexa | منصة المنيو الذكية</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: #f5f7fc; }
        .dashboard-container { display: flex; min-height: 100vh; }
        .sidebar { width: 320px; background: white; border-left: 1px solid #e2e8f0; padding: 1.5rem; overflow-y: auto; box-shadow: 0 0 15px rgba(0,0,0,0.02); }
        .main-area { flex: 1; padding: 1.5rem; overflow-y: auto; }
        .logo-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .logo-img { height: 44px; }
        .logout-btn { background: #f1f5f9; border: none; padding: 0.4rem 1rem; border-radius: 40px; cursor: pointer; font-weight: 500; }
        .sidebar-nav { margin-top: 1rem; }
        .nav-item { padding: 0.7rem 1rem; margin: 0.3rem 0; border-radius: 28px; cursor: pointer; transition: 0.2s; font-weight: 600; color: #1e293b; }
        .nav-item:hover, .nav-item.active { background: #eef2ff; color: #2A6DFF; }
        .template-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 1rem; margin-bottom: 2rem; }
        .template-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); text-align: center; transition: transform 0.2s; cursor: pointer; border: 2px solid transparent; }
        .template-card.selected { border-color: #2A6DFF; box-shadow: 0 4px 12px rgba(42,109,255,0.2); }
        .template-card img { width: 100%; height: 100px; object-fit: cover; background: #f1f5f9; }
        .template-card h4 { font-size: 0.85rem; margin: 0.5rem 0; color: #1e293b; }
        .preview-card { background: white; border-radius: 28px; padding: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 1.5rem; }
        .menu-header input, .menu-header textarea { width: 100%; margin-bottom: 0.5rem; padding: 0.5rem; border: 1px solid #e2e8f0; border-radius: 28px; }
        .telegram-row { display: flex; gap: 0.8rem; flex-wrap: wrap; margin: 1rem 0; }
        .telegram-row input { flex: 1; padding: 0.5rem 1rem; border-radius: 28px; border: 1px solid #cbd5e1; }
        .section-card { border-bottom: 1px solid #e2e8f0; margin-bottom: 1rem; padding-bottom: 0.8rem; }
        .section-title { font-weight: 700; font-size: 1.3rem; margin: 0.5rem 0; display: inline-block; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 1rem; margin-top: 0.5rem; }
        .menu-item { background: #f8fafc; border-radius: 20px; padding: 0.8rem; display: flex; gap: 0.8rem; align-items: center; }
        .item-img { width: 70px; height: 70px; border-radius: 16px; object-fit: cover; background: #e2e8f0; }
        .item-info { flex: 1; }
        .item-name { font-weight: bold; }
        .item-price { color: #2A6DFF; font-weight: bold; }
        .btn-icon { background: #e2e8f0; border: none; padding: 0.3rem 0.8rem; border-radius: 30px; cursor: pointer; font-size: 0.75rem; }
        .btn-danger { background: #fee2e2; color: #b91c1c; }
        .btn-primary { background: #2A6DFF; color: white; border: none; padding: 0.5rem 1.2rem; border-radius: 40px; cursor: pointer; }
        .add-btn { background: #eef2ff; color: #2A6DFF; border: none; padding: 0.4rem 1rem; border-radius: 40px; margin-top: 0.5rem; cursor: pointer; }
        @media (max-width: 768px) { .dashboard-container { flex-direction: column; } .sidebar { width: 100%; } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDoNUIF2bdo3Io7Ma3-mlFLhzRsM-kBoFM",
            authDomain: "ordexa-platforma.firebaseapp.com",
            projectId: "ordexa-platforma",
            storageBucket: "ordexa-platforma.firebasestorage.app",
            messagingSenderId: "443941203542",
            appId: "1:443941203542:web:1db99037cfec361b2155f7",
            measurementId: "G-CEGYC1BQPV"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        
        // DOM elements
        const authGuard = document.getElementById('authGuard');
        const dashboard = document.getElementById('dashboardContent');
        const userNameSpan = document.getElementById('userName');
        const logoutBtn = document.getElementById('logoutBtn');
        const templateGrid = document.getElementById('templatesGrid');
        const livePreviewDiv = document.getElementById('livePreview');
        const menuLinkSpan = document.getElementById('menuLinkSpan');
        const copyLinkBtn = document.getElementById('copyLinkBtn');
        
        let currentUser = null;
        let userData = { sections: [], items: [], settings: {} };
        
        // قوالب مع صور من مصادر مجانية (يمكنك استبدالها بأي صور)
        const templatesList = [
            { id: 'classic', name: 'كلاسيكي أنيق', image: 'https://picsum.photos/id/104/300/200' },
            { id: 'modern', name: 'عصري مشرق', image: 'https://picsum.photos/id/20/300/200' },
            { id: 'dark', name: 'ليلي فاخر', image: 'https://picsum.photos/id/29/300/200' },
            { id: 'tabs', name: 'تبويبات ذكية', image: 'https://picsum.photos/id/94/300/200' },
            { id: 'simple', name: 'بسيط وسريع', image: 'https://picsum.photos/id/96/300/200' },
            { id: 'bono', name: 'بافلو بونو', image: 'https://picsum.photos/id/106/300/200' }
        ];
        
        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'login.html'; return; }
            currentUser = user;
            authGuard.style.display = 'none';
            dashboard.style.display = 'flex';
            userNameSpan.textContent = user.displayName || user.email || 'عميل';
            await loadUserData();
            renderTemplates();
            renderLivePreview();
            updateMenuLink();
        });
        
        async function loadUserData() {
            const docRef = doc(db, 'users', currentUser.uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                userData = docSnap.data();
            } else {
                userData = {
                    sections: ['مقبلات', 'أطباق رئيسية', 'مشروبات', 'حلويات'],
                    items: [
                        { id: '1', nameAr: 'شاورما دجاج', price: 60, section: 'أطباق رئيسية', descAr: 'شاورما لذيذة', imageUrl: null },
                        { id: '2', nameAr: 'سلطة خضراء', price: 35, section: 'مقبلات', descAr: 'طازجة', imageUrl: null },
                        { id: '3', nameAr: 'عصير برتقال', price: 25, section: 'مشروبات', descAr: 'طبيعي', imageUrl: null }
                    ],
                    settings: { template: 'classic', restaurantName: 'مطعم النخبة', telegramBot: '', telegramChat: '' }
                };
                await setDoc(docRef, userData);
            }
        }
        
        async function saveUserData() {
            const docRef = doc(db, 'users', currentUser.uid);
            await setDoc(docRef, userData, { merge: true });
        }
        
        function renderTemplates() {
            templateGrid.innerHTML = '';
            templatesList.forEach(tpl => {
                const card = document.createElement('div');
                card.className = `template-card ${userData.settings?.template === tpl.id ? 'selected' : ''}`;
                card.innerHTML = `<img src="${tpl.image}" alt="${tpl.name}"><h4>${tpl.name}</h4>`;
                card.onclick = async () => {
                    userData.settings.template = tpl.id;
                    await saveUserData();
                    renderTemplates();
                    renderLivePreview();
                    alert(`تم اختيار قالب ${tpl.name}`);
                };
                templateGrid.appendChild(card);
            });
        }
        
        function renderLivePreview() {
            let html = `<div class="menu-header">
                            <input type="text" id="restaurantName" value="${userData.settings?.restaurantName || ''}" placeholder="اسم المطعم">
                            <div class="telegram-row">
                                <input type="text" id="telegramBot" placeholder="Bot Token" value="${userData.settings?.telegramBot || ''}">
                                <input type="text" id="telegramChat" placeholder="Chat ID" value="${userData.settings?.telegramChat || ''}">
                                <button id="saveTelegramBtn" class="btn-primary" style="padding:0.3rem 1rem;">حفظ</button>
                            </div>
                        </div>`;
            for (let section of userData.sections) {
                html += `<div class="section-card" data-section="${section}">
                            <div style="display:flex; justify-content:space-between;">
                                <h3 class="section-title" contenteditable="true">${section}</h3>
                                <button class="btn-icon btn-danger delete-section" data-section="${section}">حذف القسم</button>
                            </div>
                            <div class="items-grid">`;
                const sectionItems = userData.items.filter(i => i.section === section);
                for (let item of sectionItems) {
                    html += `<div class="menu-item" data-id="${item.id}">
                                <img class="item-img" src="${item.imageUrl || 'https://placehold.co/80x80'}" onerror="this.src='https://placehold.co/80x80'">
                                <div class="item-info">
                                    <div class="item-name" contenteditable="true">${item.nameAr}</div>
                                    <div class="item-price" contenteditable="true">${item.price} ج.م</div>
                                    <div class="item-desc" contenteditable="true">${item.descAr || ''}</div>
                                    <div style="margin-top:6px;">
                                        <button class="btn-icon change-image" data-id="${item.id}">🖼️ تغيير الصورة</button>
                                        <button class="btn-icon btn-danger delete-item" data-id="${item.id}">🗑️ حذف</button>
                                    </div>
                                </div>
                            </div>`;
                }
                html += `</div><button class="add-item" data-section="${section}">+ إضافة صنف لهذا القسم</button></div>`;
            }
            html += `<button id="addSectionBtn" class="btn-primary" style="margin-top:1rem;">+ إضافة قسم جديد</button>`;
            livePreviewDiv.innerHTML = html;
            
            // ربط الأحداث
            document.getElementById('restaurantName').addEventListener('blur', async (e) => {
                userData.settings.restaurantName = e.target.value;
                await saveUserData();
            });
            document.getElementById('saveTelegramBtn').onclick = async () => {
                userData.settings.telegramBot = document.getElementById('telegramBot').value;
                userData.settings.telegramChat = document.getElementById('telegramChat').value;
                await saveUserData();
                alert('تم حفظ إعدادات التليجرام');
            };
            // تعديل النصوص المباشرة
            document.querySelectorAll('[contenteditable="true"]').forEach(el => {
                el.addEventListener('blur', async (e) => {
                    const target = e.target;
                    if (target.classList.contains('section-title')) {
                        const oldSection = target.closest('.section-card').getAttribute('data-section');
                        const newName = target.innerText.trim();
                        if (newName && newName !== oldSection) {
                            const index = userData.sections.indexOf(oldSection);
                            if (index !== -1) userData.sections[index] = newName;
                            userData.items.forEach(i => { if (i.section === oldSection) i.section = newName; });
                            await saveUserData();
                            renderLivePreview();
                        }
                    } else if (target.classList.contains('item-name')) {
                        const itemId = target.closest('.menu-item').getAttribute('data-id');
                        const item = userData.items.find(i => i.id === itemId);
                        if (item) { item.nameAr = target.innerText.trim(); await saveUserData(); }
                    } else if (target.classList.contains('item-price')) {
                        const itemId = target.closest('.menu-item').getAttribute('data-id');
                        const item = userData.items.find(i => i.id === itemId);
                        if (item) {
                            let price = parseFloat(target.innerText.replace(' ج.م', ''));
                            if (!isNaN(price)) item.price = price;
                            await saveUserData();
                        }
                    } else if (target.classList.contains('item-desc')) {
                        const itemId = target.closest('.menu-item').getAttribute('data-id');
                        const item = userData.items.find(i => i.id === itemId);
                        if (item) { item.descAr = target.innerText.trim(); await saveUserData(); }
                    }
                });
            });
            // حذف قسم
            document.querySelectorAll('.delete-section').forEach(btn => {
                btn.onclick = async () => {
                    const section = btn.getAttribute('data-section');
                    if (confirm(`حذف القسم "${section}" وجميع أصنافه؟`)) {
                        userData.sections = userData.sections.filter(s => s !== section);
                        userData.items = userData.items.filter(i => i.section !== section);
                        await saveUserData();
                        renderLivePreview();
                    }
                };
            });
            // تغيير الصورة
            document.querySelectorAll('.change-image').forEach(btn => {
                btn.onclick = async () => {
                    const itemId = btn.getAttribute('data-id');
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = 'image/*';
                    input.onchange = async (e) => {
                        const file = e.target.files[0];
                        if (!file) return;
                        const storageRef = ref(storage, `menu/${currentUser.uid}/${Date.now()}_${file.name}`);
                        const uploadTask = uploadBytesResumable(storageRef, file);
                        uploadTask.on('state_changed', null, null, async () => {
                            const url = await getDownloadURL(uploadTask.snapshot.ref);
                            const item = userData.items.find(i => i.id === itemId);
                            if (item) {
                                if (item.imageUrl) try { await deleteObject(ref(storage, item.imageUrl)); } catch(e) {}
                                item.imageUrl = url;
                                await saveUserData();
                                renderLivePreview();
                            }
                        });
                    };
                    input.click();
                };
            });
            // حذف صنف
            document.querySelectorAll('.delete-item').forEach(btn => {
                btn.onclick = async () => {
                    const itemId = btn.getAttribute('data-id');
                    if (confirm('حذف هذا الصنف؟')) {
                        userData.items = userData.items.filter(i => i.id !== itemId);
                        await saveUserData();
                        renderLivePreview();
                    }
                };
            });
            // إضافة صنف
            document.querySelectorAll('.add-item').forEach(btn => {
                btn.onclick = async () => {
                    const section = btn.getAttribute('data-section');
                    const name = prompt('اسم الصنف:');
                    if (!name) return;
                    const price = parseFloat(prompt('السعر (ج.م):'));
                    if (isNaN(price)) return;
                    const newItem = {
                        id: Date.now().toString(),
                        nameAr: name, price: price, section: section, descAr: '', imageUrl: null
                    };
                    userData.items.push(newItem);
                    await saveUserData();
                    renderLivePreview();
                };
            });
            // إضافة قسم
            const addSection = document.getElementById('addSectionBtn');
            if (addSection) addSection.onclick = async () => {
                const newSection = prompt('اسم القسم الجديد:');
                if (newSection && !userData.sections.includes(newSection)) {
                    userData.sections.push(newSection);
                    await saveUserData();
                    renderLivePreview();
                } else alert('القسم موجود مسبقاً أو غير صالح');
            };
        }
        
        function updateMenuLink() {
            const link = `${window.location.origin}/menu1.index?uid=${currentUser.uid}`;
            menuLinkSpan.textContent = link;
        }
        copyLinkBtn.onclick = () => {
            navigator.clipboard.writeText(menuLinkSpan.textContent);
            alert('تم نسخ رابط المنيو');
        };
        logoutBtn.onclick = async () => { await signOut(auth); window.location.href = 'login.html'; };
        
        // التبويبات
        window.showTab = (tabId) => {
            document.querySelectorAll('.tab-pane').forEach(tab => tab.style.display = 'none');
            document.getElementById(tabId).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            if (tabId === 'menu-tab') document.querySelector('[data-tab="menu"]')?.classList.add('active');
            if (tabId === 'templates-tab') document.querySelector('[data-tab="templates"]')?.classList.add('active');
            if (tabId === 'link-tab') document.querySelector('[data-tab="link"]')?.classList.add('active');
        };
        window.showTab('menu-tab');
    </script>
</head>
<body>
    <div id="authGuard" style="text-align:center;padding:3rem;">جاري التحقق من الجلسة...</div>
    <div id="dashboardContent" style="display:none;" class="dashboard-container">
        <aside class="sidebar">
            <div class="logo-area">
                <img class="logo-img" src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg8h07xrvSaXQ40FLkiIjv0nWbLy81uybfhvz-fzqf4gRnq8whBCmPYai7CzBTCFqVSyMURBPRSZ9EcC14JgkRM1P38h76Rp7V3CEGDDeiEuJmBtKP4FKNkw7qNqA6y_9VpYI7kxyLdVuxE5flbCdL2GWND06L4eA_EqXwg4Tpx-0QU4V7S4UXYHXZCjEM/s320/ei_1777296305238-removebg-preview.png" alt="Ordexa">
                <button id="logoutBtn" class="logout-btn">تسجيل خروج</button>
            </div>
            <div class="sidebar-nav">
                <div class="nav-item" data-tab="menu" onclick="showTab('menu-tab')">📋 إدارة المنيو</div>
                <div class="nav-item" data-tab="templates" onclick="showTab('templates-tab')">🎨 القوالب والتخصيص</div>
                <div class="nav-item" data-tab="link" onclick="showTab('link-tab')">🔗 رابط المنيو الخاص</div>
            </div>
            <p style="font-size:0.8rem; color:#64748b; margin-top:2rem;">اختر قالبك من الأسفل، ثم عدّل البيانات مباشرة</p>
        </aside>
        <main class="main-area">
            <h2 style="margin-bottom:1rem;">مرحباً, <span id="userName"></span> 👋</h2>
            <div id="menu-tab" class="tab-pane">
                <div id="livePreview" class="preview-card"></div>
            </div>
            <div id="templates-tab" class="tab-pane" style="display:none;">
                <div class="preview-card">
                    <h3>🎨 اختر قالبك المفضل</h3>
                    <div id="templatesGrid" class="template-grid"></div>
                </div>
            </div>
            <div id="link-tab" class="tab-pane" style="display:none;">
                <div class="preview-card">
                    <h3>🔗 رابط منيو مطعمك</h3>
                    <p>انسخ هذا الرابط وضعه على موقعك أو وسائل التواصل:</p>
                    <div style="background:#f1f5f9; padding:0.8rem; border-radius:28px; word-break:break-all; margin:1rem 0;"><span id="menuLinkSpan"></span></div>
                    <button id="copyLinkBtn" class="btn-primary">نسخ الرابط</button>
                    <p style="margin-top:1rem; font-size:0.8rem;">✨ أي تعديل تظهر فوراً على الرابط بدون حاجة لتغيير شيء.</p>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
