<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>لوحة تحكم Ordexa</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #0A0F1E;
            --surface-dark: #111827;
            --card-bg: rgba(30, 41, 59, 0.6);
            --primary-blue: #2563EB;
            --primary-gold: #F59E0B;
            --accent-purple: #8B5CF6;
            --text-light: #F1F5F9;
            --text-dim: #94A3B8;
            --border-dim: #334155;
            --shadow-md: 0 10px 25px -5px rgba(0,0,0,0.2);
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            overflow-x: hidden;
        }
        body.en { direction: ltr; font-family: 'Inter', sans-serif; }
        .loading {
            position: fixed; inset: 0; background: #0A0F1E; display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .spinner { width: 48px; height: 48px; border: 4px solid #1E293B; border-top-color: var(--primary-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .dashboard { display: flex; min-height: 100vh; }
        /* Sidebar */
        .sidebar {
            width: 280px;
            position: fixed;
            background: rgba(17, 24, 39, 0.9);
            backdrop-filter: blur(16px);
            height: 100vh;
            overflow-y: auto;
            border-left: 1px solid var(--border-dim);
            transition: 0.3s;
            z-index: 100;
        }
        .sidebar-header {
            padding: 1.5rem;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-blue), var(--accent-purple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            border-bottom: 1px solid var(--border-dim);
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1.5rem;
            margin: 0.2rem 0;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-dim);
            font-weight: 500;
        }
        .nav-item.active, .nav-item:hover {
            background: rgba(37,99,235,0.15);
            color: var(--primary-blue);
            border-right: 3px solid var(--primary-blue);
        }
        .main-content {
            flex: 1;
            margin-right: 280px;
            padding: 1.5rem;
        }
        /* Top header */
        .top-header {
            background: rgba(17, 24, 39, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 0.8rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .profile-circle {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary-blue), var(--accent-purple));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .btn-outline {
            background: #1E293B;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-outline:hover { background: #2563EB; }
        /* Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 1.2rem;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.2s;
        }
        .stat-card:hover { transform: translateY(-4px); background: rgba(30,41,59,0.8); }
        .products-grid, .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px,1fr));
            gap: 1.5rem;
            margin: 1rem 0;
        }
        .product-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 1.2rem;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .product-card:hover {
            transform: scale(1.02);
            border-color: var(--primary-blue);
            background: rgba(30,41,59,0.9);
        }
        .badge {
            background: var(--primary-gold);
            color: #0A0F1E;
            padding: 0.2rem 0.8rem;
            border-radius: 60px;
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-block;
        }
        .price { font-size: 1.4rem; font-weight: 800; margin: 0.6rem 0; }
        .old-price { text-decoration: line-through; color: var(--text-dim); font-size: 0.8rem; margin-right: 8px; }
        .btn-subscribe {
            background: linear-gradient(95deg, var(--primary-blue), var(--accent-purple));
            width: 100%;
            padding: 0.7rem;
            border-radius: 60px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }
        .btn-subscribe:hover { transform: translateY(-2px); }
        table {
            width: 100%;
            background: rgba(30,41,59,0.6);
            border-radius: 24px;
            overflow: hidden;
        }
        th, td { padding: 1rem; text-align: right; border-bottom: 1px solid var(--border-dim); }
        .status-complete { color: #22C55E; }
        .status-progress { color: #3B82F6; }
        .status-pending { color: #F59E0B; }
        .tab-pane { display: none; animation: fade 0.3s; }
        .active-tab { display: block; }
        .mobile-menu-btn { display: none; background: none; border: none; color: white; font-size: 1.8rem; cursor: pointer; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(100%); width: 260px; }
            .sidebar.open { transform: translateX(0); }
            .mobile-menu-btn { display: block; }
            .main-content { margin-right: 0; }
        }
        .support-buttons { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem; }
        .support-btn {
            background: #1E293B;
            padding: 0.6rem 1.5rem;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
        }
        .fancy-banner {
            background: linear-gradient(120deg, #1E2A3A, #0F172A);
            border-radius: 32px;
            padding: 1rem 1.5rem;
            margin: 1rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
<div class="loading" id="loading"><div class="spinner"></div></div>
<div class="dashboard" id="dashboard" style="display: none;">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">Ordexa ✦</div>
        <div class="sidebar-nav">
            <div class="nav-item active" data-tab="dashboard"><span class="material-symbols-outlined">dashboard</span> الرئيسية</div>
            <div class="nav-item" data-tab="products"><span class="material-symbols-outlined">widgets</span> منتجاتنا</div>
            <div class="nav-item" data-tab="orders"><span class="material-symbols-outlined">receipt</span> طلباتي</div>
            <div class="nav-item" data-tab="invoices"><span class="material-symbols-outlined">description</span> الفواتير</div>
            <div class="nav-item" data-tab="support"><span class="material-symbols-outlined">support_agent</span> الدعم</div>
            <div class="nav-item" data-tab="profile"><span class="material-symbols-outlined">account_circle</span> حسابي</div>
        </div>
    </aside>
    <main class="main-content">
        <div class="top-header">
            <div><h2 style="background:linear-gradient(115deg,#3B82F6,#8B5CF6); background-clip:text; -webkit-background-clip:text; color:transparent;">Ordexa Platform</h2></div>
            <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <div class="profile-circle" id="profileInitial">أ</div>
                <span id="userNameDisplay"></span>
                <button class="btn-outline" id="langToggle">English</button>
                <button class="btn-outline" id="logoutBtn">خروج</button>
            </div>
        </div>
        <div id="tab-dashboard" class="tab-pane active-tab"></div>
        <div id="tab-products" class="tab-pane"></div>
        <div id="tab-orders" class="tab-pane"></div>
        <div id="tab-invoices" class="tab-pane"></div>
        <div id="tab-support" class="tab-pane"></div>
        <div id="tab-profile" class="tab-pane"></div>
    </main>
</div>
<div id="toast" style="position:fixed; bottom:20px; left:20px; background:#1E293B; padding:10px 20px; border-radius:40px; opacity:0; transition:0.2s; z-index:200;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDoNUIF2bdo3Io7Ma3-mlFLhzRsM-kBoFM",
        authDomain: "ordexa-platforma.firebaseapp.com",
        projectId: "ordexa-platforma",
        storageBucket: "ordexa-platforma.firebasestorage.app",
        messagingSenderId: "443941203542",
        appId: "1:443941203542:web:1db99037cfec361b2155f7",
        measurementId: "G-CEGYC1BQPV"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let userData = {};

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = 'login.html'; return; }
        currentUser = user;
        const userRef = doc(db, 'users', user.uid);
        const snap = await getDoc(userRef);
        if (snap.exists()) userData = snap.data();
        else {
            userData = { fullName: user.displayName || user.email.split('@')[0], email: user.email, phone: '', orders: [], activeProducts: [] };
            await setDoc(userRef, userData);
        }
        document.getElementById('loading').style.display = 'none';
        document.getElementById('dashboard').style.display = 'flex';
        document.getElementById('userNameDisplay').innerText = userData.fullName || 'عميل';
        document.getElementById('profileInitial').innerText = (userData.fullName?.[0] || 'أ');
        renderAll();
    });

    function renderAll() {
        // Dashboard Tab
        document.getElementById('tab-dashboard').innerHTML = `
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-title">📦 الطلبات</div><div class="stat-number">${userData.orders?.length || 0}</div></div>
                <div class="stat-card"><div class="stat-title">✅ اشتراكات نشطة</div><div class="stat-number">${userData.activeProducts?.length || 2}</div></div>
                <div class="stat-card"><div class="stat-title">⏱️ آخر طلب</div><div class="stat-number">اليوم</div></div>
                <div class="stat-card"><div class="stat-title">⚡ الحالة</div><div class="stat-number" style="color:#22C55E;">مفعل</div></div>
            </div>
            <div class="fancy-banner"><span>🔥 خصومات حصرية هذا الشهر</span><span>عرض ينتهي خلال 5 أيام</span></div>
            <div class="section-title"><span class="material-symbols-outlined">work</span> آخر أعمالنا</div>
            <div class="portfolio-grid">
                <div class="product-card">🌟 مطعم جريل هاوس – منيو إلكتروني + واتساب</div>
                <div class="product-card">🚀 لاندينج بيج – زيادة مبيعات 55%</div>
                <div class="product-card">🛍️ متجر أزياء – تكامل دفع آلي</div>
            </div>
        `;
        // Products
        const products = [
            { name: "منيو إلكتروني لمطعمك/كافيهك", desc: "اعرض كل منتجاتك وصورك داخل موقع احترافي سريع.", price: "300 ج.م", old: "550 ج.م", badge: "الأكثر طلبًا" },
            { name: "منيو احترافي + استقبال الطلبات", desc: "استقبل الأوردرات مباشرة على واتساب، تليجرام، جيميل.", price: "650 ج.م", old: "900 ج.م", badge: "عرض خاص" },
            { name: "Landing Page احترافية", desc: "صفحة هبوط قوية لزيادة المبيعات.", price: "200 ج.م", old: "350 ج.م", badge: null },
            { name: "خدمة خاصة (حسب الطلب)", desc: "اطلب أي موقع أو نظام مخصص لنشاطك التجاري.", price: "حسب الطلب", old: null, badge: null }
        ];
        document.getElementById('tab-products').innerHTML = `
            <div class="section-title"><span class="material-symbols-outlined">sell</span> منتجاتنا الرقمية</div>
            <div class="products-grid">${products.map(p => `
                <div class="product-card">
                    ${p.badge ? `<span class="badge">${p.badge}</span>` : ''}
                    <h3>${p.name}</h3>
                    <p style="margin:8px 0; color:#94A3B8;">${p.desc}</p>
                    <div class="price">${p.price} ${p.old ? `<span class="old-price">${p.old}</span>` : ''}</div>
                    <button class="btn-subscribe" data-prod="${p.name}">اشترك الآن</button>
                </div>`).join('')}</div>
        `;
        document.querySelectorAll('.btn-subscribe').forEach(btn => btn.addEventListener('click', () => showToast("✅ تم إرسال طلب الاشتراك")));
        // Orders (demo)
        const orders = userData.orders?.length ? userData.orders : [
            { id: 1025, service: "منيو إلكتروني", date: "12/5/2026", status: "completed" },
            { id: 1026, service: "لاندينج بيدج", date: "14/5/2026", status: "in_progress" },
            { id: 1027, service: "خدمة خاصة", date: "15/5/2026", status: "pending_payment" }
        ];
        let ordersHtml = '<div class="section-title"><span class="material-symbols-outlined">receipt_long</span> طلباتي</div><table><thead><tr><th>#</th><th>الخدمة</th><th>التاريخ</th><th>الحالة</th></tr></thead><tbody>';
        orders.forEach(o => {
            let statusClass = o.status === 'completed' ? 'status-complete' : (o.status === 'in_progress' ? 'status-progress' : 'status-pending');
            let statusText = o.status === 'completed' ? 'مكتمل' : (o.status === 'in_progress' ? 'جاري التنفيذ' : 'بانتظار الدفع');
            ordersHtml += `<tr><td>#${o.id}</td><td>${o.service}</td><td>${o.date}</td><td class="${statusClass}">${statusText}</td></tr>`;
        });
        ordersHtml += '</tbody></table>';
        document.getElementById('tab-orders').innerHTML = ordersHtml;
        // Invoices
        const invoices = [
            { name: "فاتورة مايو", status: "paid" },
            { name: "فاتورة يونيو", status: "due" }
        ];
        let invHtml = '<div class="section-title"><span class="material-symbols-outlined">receipt</span> الفواتير</div><table><thead><tr><th>الفاتورة</th><th>الحالة</th><th></th></tr></thead><tbody>';
        invoices.forEach(inv => {
            invHtml += `<tr><td>${inv.name}</td><td style="color:${inv.status === 'paid' ? '#22C55E' : '#F59E0B'}">${inv.status === 'paid' ? 'مدفوعة' : 'مستحقة'}</td><td><button class="pay-btn" style="background:#2563EB; border:none; padding:0.3rem 1rem; border-radius:40px; cursor:pointer;">ادفع الآن</button></td></tr>`;
        });
        invHtml += '</tbody></table>';
        document.getElementById('tab-invoices').innerHTML = invHtml;
        document.querySelectorAll('.pay-btn').forEach(btn => btn.addEventListener('click', () => showToast("🔁 محاكاة الدفع")));
        // Support
        document.getElementById('tab-support').innerHTML = `
            <div class="section-title"><span class="material-symbols-outlined">headset_mic</span> الدعم الفني</div>
            <div class="support-buttons">
                <div class="support-btn" id="waBtn">💬 WhatsApp</div>
                <div class="support-btn" id="msgBtn">📘 Messenger</div>
                <div class="support-btn" id="ticketBtn">🎫 تذكرة دعم</div>
            </div>
        `;
        document.getElementById('waBtn')?.addEventListener('click', () => showToast("جاري التحويل إلى واتساب"));
        document.getElementById('msgBtn')?.addEventListener('click', () => showToast("جاري التحويل إلى ماسنجر"));
        document.getElementById('ticketBtn')?.addEventListener('click', () => showToast("تم فتح تذكرة دعم جديدة"));
        // Profile
        document.getElementById('tab-profile').innerHTML = `
            <div class="section-title"><span class="material-symbols-outlined">settings</span> الحساب الشخصي</div>
            <div style="background:rgba(30,41,59,0.6); backdrop-filter:blur(8px); border-radius:32px; padding:1.5rem; max-width:500px;">
                <div style="margin-bottom:1rem;"><label>الاسم الكامل</label><input type="text" id="fullName" value="${userData.fullName || ''}" style="width:100%; padding:0.7rem; border-radius:28px; background:#1E293B; border:1px solid #334155; color:white;"></div>
                <div style="margin-bottom:1rem;"><label>البريد الإلكتروني</label><input type="email" id="email" value="${currentUser.email}" style="width:100%; padding:0.7rem; border-radius:28px; background:#1E293B;"></div>
                <div style="margin-bottom:1rem;"><label>رقم الهاتف</label><input type="tel" id="phone" value="${userData.phone || ''}" style="width:100%; padding:0.7rem; border-radius:28px; background:#1E293B;"></div>
                <div style="margin-bottom:1rem;"><label>تغيير كلمة المرور</label><input type="password" id="newPass" placeholder="********" style="width:100%; padding:0.7rem; border-radius:28px;"></div>
                <button id="saveProfileBtn" class="btn-subscribe" style="width:auto; padding:0.6rem 1.5rem;">حفظ التغييرات</button>
            </div>
        `;
        document.getElementById('saveProfileBtn')?.addEventListener('click', async () => {
            const fullName = document.getElementById('fullName').value;
            const phone = document.getElementById('phone').value;
            await setDoc(doc(db, 'users', currentUser.uid), { fullName, phone }, { merge: true });
            showToast("تم تحديث الملف الشخصي");
            location.reload();
        });
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2000);
    }

    const tabs = ['dashboard', 'products', 'orders', 'invoices', 'support', 'profile'];
    document.querySelectorAll('.nav-item[data-tab]').forEach(el => {
        el.addEventListener('click', () => {
            const tab = el.getAttribute('data-tab');
            tabs.forEach(t => document.getElementById(`tab-${t}`).classList.remove('active-tab'));
            document.getElementById(`tab-${tab}`).classList.add('active-tab');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        });
    });
    document.getElementById('logoutBtn')?.addEventListener('click', () => { signOut(auth); window.location.href = 'login.html'; });
    document.getElementById('langToggle')?.addEventListener('click', () => document.body.classList.toggle('en'));
    document.getElementById('mobileMenuBtn')?.addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));
</script>
</body>
</html>
